<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>吃药么 · 在线演示 Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1E9BFF; --blue-deep:#0A74F0; --blue-grad:linear-gradient(155deg,#3FB0FF,#0A74F0);
  --green:#2FBF5B; --green-deep:#1FA24A; --green-soft:#E7F8EE;
  --red:#FF4438; --red-deep:#E0342A; --red-soft:#FFECEA;
  --ink:#15222F; --muted:#6A788B; --faint:#9AA7B6; --line:#E9EEF5;
  --app:#FBFCFE; --card:#FFFFFF;
  --shadow:0 14px 34px -16px rgba(18,42,82,.22); --shadow-sm:0 6px 16px -8px rgba(18,42,82,.18);
  --r:26px; --sans:"Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  --disp:"Baloo 2","Noto Sans SC",system-ui,sans-serif;
  --bh:40px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;}
body{font-family:var(--sans);color:var(--ink);background:var(--app);overflow:hidden;}
#screen{position:absolute;top:var(--bh);right:0;bottom:78px;left:0;overflow-y:auto;padding:8px 22px 22px;}
#screen::-webkit-scrollbar{width:0;}
.hidden{display:none!important;}

/* demo banner */
#demo-banner{position:fixed;top:0;left:0;right:0;height:var(--bh);z-index:200;
  background:linear-gradient(90deg,#C42519,#E0342A);color:#fff;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:13px;font-weight:800;padding:0 12px;}
#demo-banner a{color:#FFD0CC;font-size:12px;font-weight:700;text-decoration:underline;white-space:nowrap;}

.ah{display:flex;align-items:flex-end;justify-content:space-between;margin:10px 0 18px;}
.ah .date{color:var(--muted);font-weight:600;font-size:14px;}
.ah .hi{font-size:27px;font-weight:900;margin-top:2px;}
.ah .ava{width:46px;height:46px;border-radius:50%;background:var(--blue-grad);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;box-shadow:var(--shadow-sm);}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow-sm);}
.hero{position:relative;overflow:hidden;border:0;color:#fff;background:var(--blue-grad);box-shadow:0 20px 40px -18px rgba(10,116,240,.7);}
.hero::after{content:"";position:absolute;right:-40px;top:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.16);}
.hero .lab{font-weight:700;font-size:14px;opacity:.92;}
.hero .time{font-family:var(--disp);font-weight:800;font-size:50px;line-height:1;margin:6px 0 2px;}
.hero .sub{font-weight:600;font-size:15px;opacity:.95;}
.hero .pillline{display:flex;align-items:center;gap:10px;margin-top:14px;background:rgba(255,255,255,.18);padding:10px 14px;border-radius:16px;}
.hero .pillline b{font-size:17px;}

.sectlab{font-weight:800;font-size:15px;margin:22px 4px 12px;display:flex;align-items:center;justify-content:space-between;}
.sectlab span{color:var(--faint);font-weight:600;font-size:12.5px;}

.row{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px 15px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
.row .t{font-family:var(--disp);font-weight:700;font-size:18px;width:54px;flex:0 0 auto;}
.row .ic{width:44px;height:44px;border-radius:14px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:#EAF3FF;}
.row .mid{flex:1;min-width:0;}
.row .mid .n{font-weight:800;font-size:16px;}
.row .mid .d{color:var(--muted);font-size:13px;font-weight:500;margin-top:2px;}
.tag{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;display:inline-block;}
.tag.after{background:#FFF3DE;color:#C77C12;} .tag.before{background:#E7F1FF;color:#1366C9;} .tag.skin{background:#EAE7FF;color:#5B43C9;}
.st{width:34px;height:34px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-weight:900;border:0;cursor:pointer;font-size:16px;}
.st.done{background:var(--green);color:#fff;} .st.miss{background:var(--red);color:#fff;}
.st.wait{background:#EDF1F6;color:var(--faint);border:2px dashed #CDD6E2;}
.row.is-done{background:var(--green-soft);border-color:#CDEFD9;} .row.is-miss{background:var(--red-soft);border-color:#FBD3CF;}

.primary{width:100%;border:0;cursor:pointer;margin-top:18px;background:var(--blue-grad);color:#fff;font-family:var(--sans);font-weight:900;font-size:20px;border-radius:22px;padding:19px;box-shadow:0 18px 34px -16px rgba(10,116,240,.75);}
.primary:active{transform:scale(.98);} .primary.green{background:linear-gradient(160deg,#46D277,var(--green-deep));}
.primary:disabled{opacity:.5;}

.drop{border:2.5px dashed #BFD4EE;border-radius:26px;background:linear-gradient(180deg,#F5FAFF,#fff);padding:30px 18px;text-align:center;cursor:pointer;}
.drop .cam{width:74px;height:74px;border-radius:24px;margin:0 auto 12px;background:var(--blue-grad);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);}
.drop .big{font-weight:900;font-size:19px;} .drop .sm{color:var(--muted);font-size:13.5px;margin-top:4px;}
.midrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:13px 4px;border-bottom:1px solid var(--line);}
.midrow:last-child{border-bottom:0;}
.midrow .n{font-weight:800;font-size:16px;} .midrow .d{color:var(--muted);font-size:13px;margin-top:2px;}
.midrow .when{font-weight:800;font-size:13px;color:var(--blue-deep);text-align:right;white-space:nowrap;}
.del{border:0;background:#FFECEA;color:var(--red-deep);font-weight:800;border-radius:12px;padding:8px 12px;cursor:pointer;font-size:13px;}

.setrow{display:flex;align-items:center;justify-content:space-between;padding:14px 4px;border-bottom:1px solid var(--line);}
.setrow:last-child{border-bottom:0;}
.setrow .l b{font-weight:800;font-size:16px;}
.setrow input[type=time]{font-family:var(--disp);font-weight:700;font-size:20px;color:var(--blue-deep);border:1.5px solid var(--line);border-radius:12px;padding:6px 10px;background:#fff;}
.hint{display:flex;gap:9px;align-items:flex-start;background:#FFF7E8;border:1px solid #FCE9C2;color:#A9710F;border-radius:16px;padding:12px 14px;font-size:13px;font-weight:600;line-height:1.5;margin-top:14px;}
.field{margin-top:12px;} .field label{font-weight:700;font-size:13px;color:var(--muted);margin-left:4px;}
.inp{width:100%;margin-top:6px;border:1.5px solid var(--line);background:#fff;border-radius:16px;padding:14px 16px;font-weight:700;font-size:16px;color:var(--ink);font-family:var(--sans);}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.chip{border:1.5px solid var(--line);border-radius:14px;padding:10px 14px;font-weight:800;font-size:13.5px;color:var(--muted);cursor:pointer;user-select:none;}
.chip.on{background:var(--blue-grad);color:#fff;border-color:transparent;box-shadow:var(--shadow-sm);}

.kpi{display:flex;gap:14px;margin-bottom:16px;}
.kpi .b{flex:1;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow-sm);text-align:center;}
.kpi .b .num{font-family:var(--disp);font-weight:800;font-size:32px;line-height:1;}
.kpi .b.main .num{color:var(--green-deep);} .kpi .b .lab{color:var(--muted);font-size:12.5px;font-weight:600;margin-top:6px;}
table.grid{width:100%;border-collapse:separate;border-spacing:7px;}
table.grid th{font-size:12px;color:var(--muted);font-weight:700;}
table.grid .day{font-weight:800;font-size:13.5px;text-align:left;width:42px;}
.cell{width:34px;height:34px;border-radius:11px;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;}
.cell.y{background:var(--green);color:#fff;} .cell.n{background:var(--red);color:#fff;} .cell.x{background:#EDF1F6;color:#C2CCD8;}
.repnote{display:flex;gap:18px;justify-content:center;margin-top:14px;color:var(--muted);font-size:12.5px;font-weight:600;}
.dot{display:inline-block;width:11px;height:11px;border-radius:50%;vertical-align:-1px;margin-right:6px;}

.vseg{display:flex;gap:6px;background:#EDF1F6;border-radius:16px;padding:5px;margin:0 0 16px;}
.vseg button{flex:1;border:0;background:none;border-radius:12px;padding:10px;font-family:var(--sans);font-weight:800;font-size:15px;color:var(--muted);cursor:pointer;}
.vseg button.on{background:#fff;color:var(--blue-deep);box-shadow:var(--shadow-sm);}
.calhead{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 12px;font-size:18px;font-weight:900;}
.navb{border:0;background:#EDF1F6;color:var(--blue-deep);width:38px;height:38px;border-radius:12px;font-size:22px;font-weight:900;cursor:pointer;}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cw{text-align:center;color:var(--faint);font-weight:700;font-size:12.5px;padding-bottom:4px;}
.cd{position:relative;aspect-ratio:1/1;border-radius:14px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;cursor:pointer;}
.cd.empty{background:none;border:0;cursor:default;}
.cd.has{background:var(--green-soft);border-color:#CDEFD9;color:var(--green-deep);}
.cd.today{outline:2.5px solid var(--blue);outline-offset:-1px;}
.cd .md{position:absolute;bottom:6px;width:7px;height:7px;border-radius:50%;background:var(--green);}
.callegend{display:flex;gap:18px;justify-content:center;margin-top:14px;color:var(--muted);font-size:12.5px;font-weight:600;}
.callegend i{display:inline-block;width:11px;height:11px;border-radius:50%;vertical-align:-1px;margin-right:6px;}
.callegend i.md{background:var(--green);} .callegend i.td{background:none;border:2px solid var(--blue);}

.guide .gline{padding:11px 2px;border-bottom:1px solid var(--line);}
.guide .gline:last-child{border-bottom:0;}
.guide .gline b{display:block;font-size:13px;color:var(--blue-deep);font-weight:800;margin-bottom:3px;}
.guide .gline span{font-size:14.5px;font-weight:600;line-height:1.55;color:var(--ink);}
.guide .gline.warn b{color:var(--red-deep);} .guide .gline.warn span{color:#9a2b22;}
.planbig{font-weight:800;font-size:17px;color:var(--green-deep);}
.notfound{font-weight:700;font-size:15px;line-height:1.6;color:var(--ink);}
.disclaimer{background:var(--red-soft);border:1.5px solid #FBD3CF;color:#9a2b22;border-radius:16px;
  padding:13px 15px;font-size:13.5px;font-weight:700;line-height:1.55;margin:16px 0 12px;}
.verifybox{display:flex;flex-direction:column;gap:12px;}
.bigverify{width:100%;border:0;cursor:pointer;border-radius:20px;padding:18px;font-family:var(--sans);
  font-weight:900;font-size:18px;color:#fff;text-align:left;box-shadow:var(--shadow-sm);}
.bigverify small{display:block;font-size:12.5px;font-weight:600;opacity:.92;margin-top:4px;}
.bigverify.cn{background:var(--blue-grad);} .bigverify.tp{background:linear-gradient(155deg,#7C8AA5,#566480);}
.bigverify:active{transform:scale(.98);}

.tabbar{position:absolute;left:0;right:0;bottom:0;height:78px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);display:flex;backdrop-filter:blur(8px);}
.tabbar button{flex:1;border:0;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--faint);font-size:11.5px;font-weight:700;cursor:pointer;font-family:var(--sans);}
.tabbar button.on{color:var(--blue-deep);} .tabbar button svg{width:24px;height:24px;}

#alarm{position:absolute;top:var(--bh);right:0;bottom:0;left:0;z-index:50;background:linear-gradient(180deg,#F3F8FF,#FBFCFE);display:flex;flex-direction:column;padding:18px 24px 26px;}
#alarm .rt{font-family:var(--disp);font-weight:800;font-size:62px;text-align:center;line-height:1;background:var(--blue-grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
#alarm .rk{text-align:center;font-weight:900;font-size:23px;margin-top:6px;}
#alarm .rk small{display:block;color:var(--muted);font-weight:600;font-size:15px;margin-top:4px;}
.medbig{margin-top:16px;background:#fff;border:1px solid var(--line);border-radius:30px;padding:22px;text-align:center;box-shadow:var(--shadow);}
.medbig .cap2{width:92px;height:92px;border-radius:26px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;background:var(--blue-grad);box-shadow:0 16px 30px -14px rgba(10,116,240,.7);}
.medbig .name{font-size:29px;font-weight:900;} .medbig .dose{margin-top:6px;font-size:19px;font-weight:700;color:var(--blue-deep);}
.medbig .note{margin-top:14px;color:var(--muted);font-size:15px;font-weight:600;background:#F4F7FC;border-radius:14px;padding:10px 14px;}
.bigbtns{display:flex;gap:16px;margin-top:auto;}
.bbtn{flex:1;border:0;cursor:pointer;border-radius:26px;padding:24px 10px;color:#fff;font-weight:900;font-size:24px;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:var(--shadow);font-family:var(--sans);}
.bbtn:active{transform:scale(.96);} .bbtn .gly{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;}
.bbtn.green{background:linear-gradient(160deg,#46D277,var(--green-deep));} .bbtn.red{background:linear-gradient(160deg,#FF6359,var(--red-deep));}
.bbtn small{font-size:13px;font-weight:600;opacity:.9;}
.later{text-align:center;margin-top:14px;color:var(--faint);font-weight:700;font-size:15px;text-decoration:underline;text-underline-offset:3px;cursor:pointer;}
#loading{position:absolute;inset:var(--bh) 0 0 0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-weight:700;}
</style>
</head>
<body>

<div id="demo-banner">
  🎭 DEMO 演示 · 模拟数据，不会真正保存或发出提醒
  <a href="https://github.com/SteveBohanMa/chiyaome/releases/latest" target="_blank">↓ 下载正式版</a>
</div>

<div id="loading">加载中…</div>
<div id="screen" class="hidden"></div>

<div class="tabbar hidden" id="tabbar">
  <button data-tab="today" class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 11l9-7 9 7"/><path d="M5 10v9h14v-9"/></svg><span class="tl" data-tl="tab_today">今日</span></button>
  <button data-tab="photo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="6" width="18" height="14" rx="3"/><circle cx="12" cy="13" r="3.5"/></svg><span class="tl" data-tl="tab_photo">拍照</span></button>
  <button data-tab="custom"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg><span class="tl" data-tl="tab_custom">自定义</span></button>
  <button data-tab="week"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M9 4v16M4 9h16"/></svg><span class="tl" data-tl="tab_week">周报</span></button>
</div>

<div id="alarm" class="hidden"></div>

<script>
/* =====================================================
   DEMO 演示模式 · JS Mock Backend
   所有 API 调用返回模拟数据，无需 Python 后端
   ===================================================== */
(function setupMockBackend() {
  const _delay = ms => new Promise(r => setTimeout(r, ms));
  const _clone = x => JSON.parse(JSON.stringify(x));

  function addMin(t, n) {
    const [h, m] = t.split(":").map(Number);
    const tot = h * 60 + m + n;
    return String(Math.floor(tot / 60) % 24).padStart(2,"0") + ":" + String(tot % 60).padStart(2,"0");
  }

  const _settings = {
    user_name: "王奶奶", lang: "zh",
    sound_on: true, voice_on: true, autostart: true, use_online: false, api_key: "",
    after_meal_delay: 30,
    times: { wake: "07:00", breakfast: "07:30", lunch: "12:00", dinner: "18:00", bedtime: "21:30" },
    family_note: "降压药每天必须按时服用，血压高时务必告知子女"
  };

  const _meds = [
    { id:"m1", name:"硝苯地平控释片", dose:"30mg（1片）", type:"pill",
      timings:["after_breakfast"], start_date:"2025-01-01", end_date:null, course_text:"长期", note:"降压药" },
    { id:"m2", name:"阿司匹林肠溶片", dose:"100mg（1片）", type:"pill",
      timings:["after_breakfast"], start_date:"2025-01-01", end_date:null, course_text:"长期", note:"防血栓，整片吞服勿嚼" },
    { id:"m3", name:"二甲双胍片", dose:"500mg（1片）", type:"pill",
      timings:["after_breakfast","after_dinner"], start_date:"2025-01-01", end_date:null, course_text:"长期", note:"降血糖，随餐服" },
    { id:"m4", name:"钙尔奇D", dose:"1片", type:"pill",
      timings:["after_lunch"], start_date:"2025-01-01", end_date:null, course_text:"长期", note:"补钙" },
    { id:"m5", name:"润肤软膏", dose:"适量", type:"skin",
      timings:["bedtime"], start_date:"2025-01-01", end_date:null, course_text:"长期", note:"睡前薄涂手背" }
  ];

  function timingToTime(timing, s) {
    const d = s.after_meal_delay || 30;
    return {
      before_breakfast: s.times.wake,
      after_breakfast:  addMin(s.times.breakfast, d),
      before_lunch:     s.times.lunch,
      after_lunch:      addMin(s.times.lunch, d),
      before_dinner:    s.times.dinner,
      after_dinner:     addMin(s.times.dinner, d),
      bedtime:          s.times.bedtime,
      custom:           "09:00"
    }[timing] || "09:00";
  }

  function genToday(meds, settings) {
    const today = new Date().toISOString().slice(0,10);
    const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
    const evts = [];
    for (const m of meds) {
      for (const timing of m.timings) {
        const time = timingToTime(timing, settings);
        const [eh, em] = time.split(":").map(Number);
        const status = (eh * 60 + em + 90 <= nowMin) ? "done" : "wait";
        evts.push({ key: `${today}_${m.id}_${timing}`, time, name: m.name, dose: m.dose,
                    type: m.type, timing, status, note: m.note || "" });
      }
    }
    return evts.sort((a,b) => a.time.localeCompare(b.time));
  }

  const _week = {
    rate: 87, done: 26, missed: 4,
    columns: ["早饭后","午饭后","晚饭后","睡前"],
    rows: [
      {day:"周一", cells:["y","y","y","y"]},
      {day:"周二", cells:["y","n","y","y"]},
      {day:"周三", cells:["y","y","n","y"]},
      {day:"周四", cells:["y","y","y","y"]},
      {day:"周五", cells:["y","y","y","n"]},
      {day:"周六", cells:["n","y","y","y"]},
      {day:"周日", cells:["y","x","y","y"]}
    ]
  };

  const _s = {
    settings: _settings,
    meds: _meds,
    today: genToday(_meds, _settings),
    week: _week
  };

  const MOCK = {
    async get_state() { return _clone(_s); },

    async mark(key, status) {
      const ev = _s.today.find(e => e.key === key);
      if (ev) ev.status = status;
      return _clone(_s);
    },

    async snooze() {},

    async pick_and_parse() {
      await _delay(1800);
      return {
        ok: true, offline: true,
        meds: [
          { name:"氨氯地平片",      dose:"5mg",  type:"pill", timings:["after_breakfast"], note:"" },
          { name:"瑞舒伐他汀钙片",  dose:"10mg", type:"pill", timings:["bedtime"],         note:"" }
        ]
      };
    },

    async confirm_parsed(meds) {
      for (const m of meds) {
        _s.meds.push({ id:"m"+Date.now()+Math.random().toString(36).slice(2),
          name:m.name, dose:m.dose, type:m.type, timings:m.timings, note:m.note||"",
          start_date:new Date().toISOString().slice(0,10), end_date:null, course_text:"长期" });
      }
      _s.today = genToday(_s.meds, _s.settings);
      return _clone(_s);
    },

    async pick_and_parse_box() {
      await _delay(2000);
      return {
        ok: true, found: true,
        raw_name: "硝苯地平控释片",
        approval_no: "国药准字H10950267",
        drug: {
          name_cn: "硝苯地平控释片", source: "seed_cn",
          indications: "用于治疗高血压、稳定型心绞痛。",

const _WDAY={"周一":"Mon","周二":"Tue","周三":"Wed","周四":"Thu","周五":"Fri","周六":"Sat","周日":"Sun"};

function todayLocalISO(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function dateLabel(iso){const L=(STATE.settings&&STATE.settings.lang)||"zh";const d=new Date(iso+"T00:00");
  if(L==="en") return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  return (d.getMonth()+1)+"月"+d.getDate()+"日 星期"+"日一二三四五六"[d.getDay()];}

function nextEvent(){ return (STATE.today||[]).find(e=>e.status==="wait") || null; }

  let hero;
  if(nx){
    hero=`<div class="card hero"><div class="lab">${t('next_dose')}</div>
      <div class="time">${nx.time}</div><div class="sub">${esc(tlabel(nx.timing))}</div>

            :`<button class="st wait" onclick="mark('${e.key}','done')">·</button>`;
    const tagcls=e.timing.startsWith("before")?"before":e.type==="skin"?"skin":"after";

  $("#screen").innerHTML=head+`
    ${hero}
    <div class="sectlab">${t('today_plan')} <span>${t('done_label')} ${doneN} / ${evs.length}</span></div>
    ${rows}`;
}
function setTodayView(v){ TODAY_VIEW=v; if(v==="month"&&!CAL_YM){ const t=new Date(); CAL_YM=t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0"); } render(); }
function shiftMonth(delta){
  let [y,m]=CAL_YM.split("-").map(Number); m+=delta;
  if(m<1){m=12;y--;} if(m>12){m=1;y++;}
  CAL_YM=y+"-"+String(m).padStart(2,"0"); renderMonth();
}
async function renderMonth(){
  const [y,m]=CAL_YM.split("-").map(Number);
  let days=[]; try{ days=await api().med_days(CAL_YM); }catch(e){}
  const has=new Set(days);
  const first=new Date(y,m-1,1), startW=(first.getDay()+6)%7;
  const dim=new Date(y,m,0).getDate();
  const todayISO=new Date().toISOString().slice(0,10);
  let cells="";
  for(let i=0;i<startW;i++) cells+=`<div class="cd empty"></div>`;
  for(let d=1;d<=dim;d++){
    const iso=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const klass=["cd",has.has(iso)?"has":"",iso===todayISO?"today":""].join(" ").trim();
    cells+=`<div class="${klass}" onclick="pickDay('${iso}')"><span>${d}</span>${has.has(iso)?'<i class="md"></i>':""}</div>`;
  }
  const wk=(((STATE.settings&&STATE.settings.lang)||"zh")==="en"?["M","T","W","T","F","S","S"]:["一","二","三","四","五","六","日"]).map(w=>`<div class="cw">${w}</div>`).join("");
  document.getElementById("calwrap").innerHTML=`
    <div class="calhead">
      <button class="navb" onclick="shiftMonth(-1)">‹</button>
      <b>${((STATE.settings&&STATE.settings.lang)||"zh")==="en"?new Date(y,m-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"}):y+"年"+m+"月"}</b>
      <button class="navb" onclick="shiftMonth(1)">›</button></div>
    <div class="cal">${wk}${cells}</div>
    <div class="callegend"><span><i class="md"></i>${t('legend_has')}</span><span><i class="td"></i>${t('legend_today')}</span></div>
    <div id="dayPanel"></div>`;
}
async function pickDay(iso){
  const r=await api().get_day(iso);
  const evs=r.events||[];
  const list=evs.map(e=>{
    const cls=e.status==="done"?"is-done":e.status==="skip"?"is-miss":"";
    const tagcls=e.timing.startsWith("before")?"before":e.type==="skin"?"skin":"after";
    return `<div class="row ${cls}"><div class="t">${e.time}</div>
      <div class="ic">${e.type==="skin"?skinSVG:pillSVG}</div>
      <div class="mid"><div class="n">${esc(e.name)} · ${esc(e.dose)}</div>
      <div class="d"><span class="tag ${tagcls}">${esc(tlabel(e.timing))}</span></div></div></div>`;
  }).join("") || `<div class="hint">${t('cal_no_plan')}</div>`;
  document.getElementById("dayPanel").innerHTML=`<div class="sectlab" style="margin-top:18px">${esc(dateLabel(iso))}</div>${list}`;
}

function renderBoxResult(r){
  const T=BT();
  const out=$("#parseOut");
  const name=(r.found?(r.drug.name_cn||r.drug.name_en):(r.raw_name||""));
  const appr=r.approval_no||"";
  let body;
  if(r.found){
    const d=r.drug, s=r.suggest;
    const srcTag=d.source==="seed_cn"?`<span class="tag after">${T.cnTag}</span>`
                :(d.source==="openfda_en"||d.source==="en_fallback")?`<span class="tag skin">${T.enTag}</span>`:"";
    const fallbackNote=(d.source==="en_fallback")?`<div class="hint" style="margin:0 0 8px">${T.enFallback}</div>`:"";
    const plan=`${s.type==="skin"?T.skin:T.oral} · ${s.timings.map(tlabel).join(" / ")}${s.dose?(" · "+esc(s.dose)):""}`;
    const fld=(t,v)=>v?`<div class="gline"><b>${t}</b><span>${esc(v)}</span></div>`:"";
    window.__boxMed={name:s.name,dose:s.dose||"",type:s.type,timings:s.timings,
                     start_date:new Date().toISOString().slice(0,10),course_text:"长期",
                     source:"otc_box",drug_key:appr||""};
    body=`
      <div class="sectlab" style="color:var(--green-deep)">${T.found}：${esc(name)} ${srcTag}</div>
      ${fallbackNote}
      <div class="card guide">
        ${fld(T.indications,d.indications)}
        ${fld(T.usage,d.usage)}
        ${fld(T.contra,d.contraindication)}
        ${fld(T.cautions,d.cautions)}
        ${d.elderly_caution?`<div class="gline warn"><b>${T.elderly}</b><span>${esc(d.elderly_caution)}</span></div>`:""}
      </div>
      <div class="sectlab">${T.plan}</div>
      <div class="card"><div class="planbig">${plan}</div>
        <div class="sm" style="color:var(--muted);margin-top:6px">${T.planNote}</div></div>`;
  }else{
    window.__boxMed=null;
    body=`<div class="sectlab" style="color:var(--red-deep)">${T.notfoundTitle}</div>
      <div class="card"><div class="notfound">${T.notfound}</div>
      ${r.names&&r.names.length?`<div class="sm" style="color:var(--muted);margin-top:8px">${T.recognized}${r.names.map(esc).join("、")}</div>`:""}</div>`;
  }
  out.innerHTML=`
    ${body}
    <div class="disclaimer">⚠ ${disclaimerText()}</div>
    <div class="verifybox">${verifyButtons(name,appr)}</div>
    ${r.found?`<button class="primary green" id="boxConfirm" disabled onclick="confirmBox()">${T.gate('<span id="cd">5</span>')}</button>`
             :`<button class="primary" onclick="gotoCustom()">${T.manualAdd}</button>`}`;
  if(r.found) startGate();
}
let _gateTimer=null;
function startGate(){
  let n=5; const btn=$("#boxConfirm");

  _gateTimer=setInterval(()=>{
    n--;

    else { const cd=$("#cd"); if(cd) cd.textContent=n; }
  },1000);
}

    <div class="medbig">
      <div class="cap2">${ev.type==="skin"
        ?'<svg width="46" height="46" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="#fff" stroke-width="2.6"/></svg>'
        :'<svg width="46" height="46" viewBox="0 0 24 24"><rect x="2.5" y="9" width="19" height="6" rx="3" fill="#fff"/><rect x="12" y="9" width="9.5" height="6" rx="3" fill="#CFE6FF"/></svg>'}</div>
      <div class="name">${esc(ev.name)}</div>
      <div class="dose">${ev.type==="skin"?"":t('eat')}${esc(ev.dose||"")}</div>
      ${ev.note?`<div class="note">${t('note_pre')}${esc(ev.note)}</div>`:""}
    </div>
    <div class="bigbtns">
      <button class="bbtn green" onclick="alarmDone()"><span class="gly"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>${ev.type==="skin"?t('done_skin'):t('done_pill')}<small>${t('tap_this')}</small></button>
      <button class="bbtn red" onclick="alarmSkip()"><span class="gly"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></span>${ev.type==="skin"?t('skip_skin'):t('skip_pill')}<small>${t('remind_later')}</small></button>
    </div>
    <div class="later" onclick="alarmLater()">${t('later_line')}</div>`;
  $("#alarm").classList.remove("hidden");
}
async function alarmDone(){ const k=ALARM_KEY; closeAlarm(); if(k&&k.indexOf("_test")===0){await api().stop_alarm();}else{await api().mark(k,"done");refresh();} }
async function alarmSkip(){ const k=ALARM_KEY; closeAlarm(); if(k&&k.indexOf("_test")===0){await api().stop_alarm();}else{await api().mark(k,"skip");refresh();} }
async function alarmLater(){ const k=ALARM_KEY; closeAlarm(); if(k&&k.indexOf("_test")===0){await api().stop_alarm();}else{await api().snooze(k,10);} }
function closeAlarm(){ $("#alarm").classList.add("hidden"); ALARM_KEY=null; }

window.showAlarmFromPython = showAlarm;
window.addEventListener("pywebviewready", async()=>{ await refresh(); });
setTimeout(() => window.dispatchEvent(new Event("pywebviewready")), 150);
</script>
</body>
